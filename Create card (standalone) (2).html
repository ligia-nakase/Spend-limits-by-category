document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"e2daa293-5cd9-4753-9927-e5328fdd7d03\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<style>\n  @font-face{font-family:'DM Sans';src:url(\"15eaed45-d22d-4b9e-a43f-c663c7a21b42\") format('truetype');font-weight:100 900;font-style:normal;font-display:swap;}\n  body{margin:0;background:#FBFCFD;}\n  *{box-sizing:border-box;}\n  input::placeholder{color:#9C9FA0;}\n  .fi{position:relative;}\n  .fi-lbl{position:absolute;top:-7px;left:10px;background:#fff;padding:0 4px;font-family:'DM Sans',sans-serif;font-variation-settings:'opsz' 9;font-size:11px;line-height:14px;color:#737677;letter-spacing:-0.006em;white-space:nowrap;max-width:calc(100% - 22px);overflow:hidden;text-overflow:ellipsis;}\n  input[type=range].dslider{-webkit-appearance:none;appearance:none;height:4px;border-radius:999px;outline:none;cursor:pointer;accent-color:#737677;}\n  input[type=range].dslider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#737677;border:2px solid #fff;box-shadow:0 1px 3px rgba(95,98,99,.45);cursor:pointer;}\n  input[type=range].dslider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#737677;border:2px solid #fff;box-shadow:0 1px 3px rgba(95,98,99,.45);cursor:pointer;}\n  @keyframes eFadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}\n  .efade{animation:eFadeIn .22s cubic-bezier(.4,0,.2,1);}\n  .tip{position:relative;display:inline-flex;align-items:center;}\n  .tipbox{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1F2223;color:#fff;font-size:12px;line-height:1.45;letter-spacing:-0.006em;padding:7px 10px;border-radius:6px;width:200px;text-align:left;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .15s;box-shadow:0 4px 12px rgba(64,67,68,.22);z-index:30;}\n  .tipbox::after{content:\"\";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1F2223;}\n  .tip:hover .tipbox{opacity:1;visibility:visible;}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;display:flex;justify-content:center;padding:28px 0;font-family:'DM Sans',sans-serif;color:#1F2223;-webkit-font-smoothing:antialiased;\">\n  <div style=\"width:1040px;background:#fff;border:1px solid #DFE1E2;border-radius:14px;box-shadow:0 8px 24px rgba(95,98,99,0.10);overflow:hidden;display:flex;flex-direction:column;\">\n\n    <!-- Header -->\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #DFE1E2;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"#335894\"><path fill-rule=\"evenodd\" clip-rule=\"evenodd\" d=\"M12.638 18.072a.559.559 0 0 1-1.12 0 5.522 5.522 0 0 0-5.517-5.513.559.559 0 1 1 0-1.118 5.522 5.522 0 0 0 5.518-5.513.56.56 0 0 1 1.119 0 5.522 5.522 0 0 0 5.517 5.513H21.6C21.31 6.407 17.119 2.4 12.009 2.4c-5.299 0-9.61 4.307-9.61 9.6 0 5.294 4.311 9.6 9.61 9.6 5.11 0 9.3-4.007 9.59-9.041h-3.444a5.522 5.522 0 0 0-5.517 5.513Z\"><\u002Fpath><\u002Fsvg>\n        <div style=\"font-variation-settings:'opsz' 18;font-size:18px;font-weight:700;letter-spacing:-0.014em;color:#1F2223;\">Create card<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:18px;\">\n        <div title=\"Prototype layout\" style=\"display:flex;align-items:center;gap:5px;border:1px dashed #BBBEBF;border-radius:8px;padding:4px 6px;background:#FBFCFD;\">\n          <span style=\"font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#9C9FA0;font-weight:600;padding:0 3px;\">Proto<\u002Fspan>\n          <sc-for list=\"{{ protoOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n            <span onclick=\"{{ opt.onPick }}\" title=\"{{ opt.name }}\" style=\"font-size:12px;font-weight:600;color:{{ opt.color }};background:{{ opt.bg }};border-radius:6px;padding:4px 9px;cursor:pointer;white-space:nowrap;\">{{ opt.label }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:6px;color:#404344;font-size:14px;cursor:pointer;\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#404344\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 14v-2a9 9 0 0 1 18 0v2\"><\u002Fpath><path d=\"M21 16a2 2 0 0 1-2 2h-1v-6h1a2 2 0 0 1 2 2z\"><\u002Fpath><path d=\"M3 16a2 2 0 0 0 2 2h1v-6H5a2 2 0 0 0-2 2z\"><\u002Fpath><\u002Fsvg>\n          Help\n        <\u002Fdiv>\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#737677\" stroke-width=\"1.8\" stroke-linecap=\"round\" style=\"cursor:pointer;\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Body -->\n    <div style=\"display:flex;gap:36px;padding:28px 32px 8px;align-items:flex-start;\">\n\n      <!-- LEFT -->\n      <div style=\"flex:1;min-width:0;\">\n        <div style=\"font-variation-settings:'opsz' 18;font-size:18px;font-weight:700;letter-spacing:-0.014em;margin-bottom:18px;\">Details<\u002Fdiv>\n\n        <!-- Shortcuts -->\n        <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;border:1px dashed #BBBEBF;border-radius:10px;padding:9px 12px;margin-bottom:20px;\">\n          <div style=\"display:flex;align-items:center;gap:6px;margin-right:2px;\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"#9747FF\"><path d=\"M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6L12 2z\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:13px;color:#737677;\">Shortcuts:<\u002Fspan>\n          <\u002Fdiv>\n          <div styl ay:flex;justify-content:flex-end;position:relative;\">\n            <div style=\"display:flex;align-items:center;\">\n              <div style=\"width:22px;height:22px;border-radius:50%;background:#EB001B;\"><\u002Fdiv>\n              <div style=\"width:22px;height:22px;border-radius:50%;background:#F79E1B;margin-left:-9px;mix-blend-mode:screen;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Title row -->\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:18px;margin-bottom:16px;\">\n          <div style=\"font-size:16px;font-weight:700;color:#1F2223;letter-spacing:-0.011em;\">Clara Virtual<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:4px;color:#1959D2;font-size:14px;font-weight:500;cursor:pointer;\">Change type\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1959D2\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Timeline summary -->\n        <div style=\"position:relative;padding-left:20px;\">\n          <div style=\"position:absolute;left:5px;top:6px;bottom:6px;width:1px;background:#DFE1E2;\"><\u002Fdiv>\n          <sc-for list=\"{{ summary }}\" as=\"row\" hint-placeholder-count=\"4\">\n            <div style=\"position:relative;margin-bottom:16px;\">\n              <div style=\"position:absolute;left:-20px;top:3px;width:11px;height:11px;border-radius:50%;border:2px solid #BBBEBF;background:#fff;\"><\u002Fdiv>\n              <div style=\"font-size:13px;color:#737677;margin-bottom:4px;\">{{ row.label }}<\u002Fdiv>\n              <sc-if value=\"{{ row.isChips }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;align-items:center;gap:6px;flex-wrap:wrap;\">\n                  <sc-for list=\"{{ row.chips }}\" as=\"c\" hint-placeholder-count=\"2\">\n                    <span style=\"font-size:12px;color:#335894;background:#EBEEF4;border-radius:6px;padding:3px 9px;\">{{ c }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ row.isText }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-size:14px;color:#1F2223;font-weight:600;letter-spacing:-0.006em;\">{{ row.value }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Footer -->\n    <div style=\"display:flex;justify-content:flex-end;gap:12px;padding:18px 32px;border-top:1px solid #DFE1E2;\">\n      <div style=\"font-size:16px;font-weight:500;color:#335894;border:1px solid #335894;border-radius:8px;padding:10px 30px;cursor:pointer;letter-spacing:-0.011em;\">Cancel<\u002Fdiv>\n      <div style=\"font-size:16px;font-weight:500;color:#fff;background:{{ createBg }};border-radius:8px;padding:11px 34px;cursor:{{ createCursor }};letter-spacing:-0.011em;\">Create<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:760}}\">\nclass Component extends DCLogic {\n  state = {\n    open: 'category',\n    limit: '1,000.00',\n    buyMode: '',\n    limitMode: 'same',\n    amts: { comm: '500', car: '500' },\n    layout: 'E',\n    tableExpanded: false,\n    tx: { inperson: true, online: true },\n    loc: { national: true, international: true },\n    merchant: 'shared',\n    tcats: [\n      { name: 'Communications', amt: '5,900' },\n      { name: 'Car rental',      amt: '500' },\n    ],\n    cMenuOpen: null,\n    cShowUnassigned: false,\n    dcats: [\n      { name: 'Communications',  amt: 400, locked: false },\n      { name: 'Car rental',      amt: 300, locked: false },\n      { name: 'Travel',          amt: 200, locked: false },\n      { name: 'Meals & dining',  amt: 100, locked: false },\n    ],\n    cgroups: [\n      { cats: ['Communications','Internet','Software','Advertising','Entertainment'], amt: '500' },\n      { cats: ['Travel','Hotels'], amt: '2,000' },\n      { cats: ['Meals & dining'], amt: '300' },\n    ],\n    // Option E — contextual limits\n    eMode1: 'specific',          // Anywhere: 'none' | 'specific'\n    eMode2: 'set',               // Only some places: 'all' | 'set'\n    eExceptions: [               // Anywhere → categories that get a custom limit\n      { name: 'Travel',         amt: '500' },\n      { name: 'Meals & dining', amt: '300' },\n    ],\n    eSelAmts: {},                // Only some places → per-category limits; unset = card limit\n    allowedCats: ['Communications','Car rental','Travel'],  // \"Allowed to buy\" selection\n    allowedOpen: false,\n    allowedSearch: '',\n    eAddOpen: false,\n    buyOpen: false,              // \"Where will you be able to buy?\" dropdown\n    eAnyRows: [ { name: '', amt: '' } ],  // Anywhere → one empty row by default\n    eAnyMode: 'all',             // Anywhere: 'all' | 'set'\n    eRowMenuOpen: null,          // which Anywhere row's category picker is open\n  };\n\n  ALL_CATS = ['Communications','Internet','Software','Advertising','Entertainment','Travel','Hotels','Meals & dining','Office supplies','Lodging','Transport','Car rental','Fuel'];\n\n  componentDidMount(){\n    this._onKey = (e)=>{ if(e.key==='Escape') this.setState({ allowedOpen:false, buyOpen:false, eRowMenuOpen:null }); };\n    document.addEventListener('keydown', this._onKey);\n  }\n  componentWillUnmount(){ document.removeEventListener('keydown', this._onKey); }\n\n  num(v){ return parseFloat(String(v).replace(/[^0-9.]/g,'')) || 0; }\n  money(n){ return '$' + n.toLocaleString('en-US'); }\n\n  // Rebalance so cats always sum to total: set cats[idx]=val, distribute the\n  // remainder across the UNLOCKED other categories. Locked categories (other\n  // than the one being edited) never change. The edited category is always\n  // allowed to change, even if locked.\n  rebalance(cats, idx, val, total){\n    const lockedOthersSum = cats.reduce((a,c,i)=> i!==idx && c.locked ? a+c.amt : a, 0);\n    const maxForIdx = Math.max(0, total - lockedOthersSum);\n    val = Math.max(0, Math.min(maxForIdx, Math.round(val)));\n    const unlockedOthers = cats.filter((c,i)=> i!==idx && !c.locked);\n    const unlockedSum = unlockedOthers.reduce((a,c)=>a+c.amt,0);\n    const remaining = total - val - lockedOthersSum;\n    let out = cats.map((c,i)=>{\n      if(i===idx) return { ...c, amt: val };\n      if(c.locked) return c;\n      const share = unlockedSum>0 ? c.amt/unlockedSum : (unlockedOthers.length ? 1/unlockedOthers.length : 0);\n      return { ...c, amt: Math.max(0, Math.round(remaining*share)) };\n    });\n    // fix rounding drift on an unlocked, non-edited category\n    const drift = total - out.reduce((a,c)=>a+c.amt,0);\n    if(drift!==0){\n      const fixAt = out.findIndex((c,i)=>i!==idx && !c.locked && c.amt+drift>=0);\n      if(fixAt>=0) out[fixAt] = { ...out[fixAt], amt: out[fixAt].amt+drift };\n      else out[idx] = { ...out[idx], amt: Math.max(0, out[idx].amt+drift) };\n    }\n    return out;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const open = s.open;\n    const toggle = (k) => () => this.setState(st => ({ open: st.open === k ? null : k }));\n    const some = s.buyMode === 'some';\n    const restrict = s.buyMode === 'restrict';\n    const anywhere = s.buyMode === 'anywhere';\n    const showAllowed = some || restrict;   // \"Allowed to buy\" multiselect visible\n    const buySelected = !!s.buyMode;\n    const custom = s.limitMode === 'custom';\n    const total = this.num(s.limit) || 1000;\n    const isA = s.layout === 'A';\n    const isB = s.layout === 'B';\n    const isC = s.layout === 'C';\n    const isD = s.layout === 'D';\n    const isE = s.layout === 'E';\n\n    // stacked totals\n    const a     onAmt: setCAmt(gi),\n      chips: g.cats.map(name=>({ name, onRemove: removeCat(gi,name) })),\n      isEmpty: g.cats.length===0,\n      manyCats: g.cats.length>2,\n      fewCats: g.cats.length<=2,\n      catCountLabel: g.cats.length + (g.cats.length===1?' category':' categories'),\n      menuOpen: s.cMenuOpen===gi,\n      toggleMenu: toggleMenu(gi),\n      addOptions: unassigned.map(name=>({ name, onAdd: addCat(gi,name) })),\n      hasUnassigned: unassigned.length>0,\n      onRemoveGroup: removeGroup(gi),\n      isLast: gi===cgroups.length-1,\n    }));\n    const addGroup = ()=> this.setState(st=>({ cgroups: st.cgroups.concat([{cats:[],amt:''}]) }));\n\n    // ---- Option D: auto-balancing sliders with locks ----\n    const dRaw = s.dcats;\n    const dAllLocked = dRaw.every(c=>c.locked);\n    const dSum = dRaw.reduce((a,c)=>a+c.amt,0);\n    // normalize display to the current card limit (keeps Remaining at 0),\n    // but never when everything is locked (we can't safely rebalance then)\n    const firstUnlocked = dRaw.findIndex(c=>!c.locked);\n    const dcats = (dSum===total || dAllLocked || firstUnlocked<0) ? dRaw\n      : this.rebalance(dRaw, firstUnlocked, dRaw[firstUnlocked].amt + (total - dSum), total);\n    const setDVal = (idx) => (raw) => {\n      if (this.state.dcats.every(c=>c.locked)) return; // fully locked → no auto changes\n      const v = this.num(raw);\n      this.setState({ dcats: this.rebalance(this.state.dcats, idx, v, this.num(this.state.limit)||1000) });\n    };\n    const toggleDLock = (idx) => () => this.setState(st=>{\n      const n = st.dcats.map((c,i)=> i===idx ? { ...c, locked: !c.locked } : c);\n      return { dcats: n };\n    });\n    const drows = dcats.map((c,idx)=>{\n      const pct = total>0 ? Math.round(c.amt/total*100) : 0;\n      return {\n        name: c.name,\n        amt: c.amt,\n        amtDisp: c.amt.toLocaleString('en-US'),\n        locked: c.locked,\n        unlocked: !c.locked,\n        lockColor: c.locked ? '#404344' : st eAnyMaxStr = this.money(total);\n\n    // Scenario \"Only some places\" / \"Restrict some places\": set limits for the allowed categories.\n    const eSet = s.eMode2 === 'set';\n    const setESelAmt = (name) => (e) => { const v=e.target.value; this.setState(st=>({ eSelAmts: {...st.eSelAmts, [name]: v} })); };\n    const cardLimitStr = String(total);\n    const eSelRows = s.allowedCats.map(name=>{\n      const amt = (s.eSelAmts[name] ?? cardLimitStr);\n      const rowError = this.num(amt) > total;\n      return {\n        name,\n        amt,\n        onChange: setESelAmt(name),\n        rowError,\n        rowBorder: rowError ? '1.5px solid #B00020' : '1px solid #BBBEBF',\n      };\n    });\n    const eHasError = isE && showAllowed && eSet && eSelRows.some(r=>r.rowError);\n    const eMaxStr = this.money(total);\n\n    // \"Allowed to buy\" multi-select\n    const allowedSet = new Set(s.allowedCats);\n    const allowedChips = s.allowedCats.map(name=>({\n      name,\n      onRemove: (e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); this.setState(st=>({ allowedCats: st.allowedCats.filter(c=>c!==name) })); },\n    }));\n    const aq = (s.allowedSearch||'').toLowerCase();\n    const allowedOptions = this.ALL_CATS.filter(c=>c.toLowerCase().includes(aq)).map(name=>({\n      name,\n      checked: allowedSet.has(name),\n      boxBg: allowedSet.has(name) ? '#335894' : '#fff',\n      boxBorder: allowedSet.has(name) ? '#335894' : '#BBBEBF',\n      rowBg: allowedSet.has(name) ? '#EBEEF4' : '#fff',\n      onToggle: ()=> this.setState(st=>{ const has=st.allowedCats.includes(name); return { allowedCats: has ? st.allowedCats.filter(c=>c!==name) : st.allowedCats.concat([name]) }; }),\n    }));\n\n    const activeError = isA ? hasError : (isB ? tHasError : (isC ? cHasError : (isE ? eHasError : false)));\n\n    // summary chips\n    const txChips = [];\n    if (s.tx.inperson) txChips.push('In-person');\n    if (s.tx.online) txChips.push('Online');\n    const usedFor = txChips.slice
