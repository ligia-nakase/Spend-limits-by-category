document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2Fspan><span style=\"font-size:15px;color:#1F2223;\">3 Nov, 2023 – 31 Oct, 2023<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;gap:20px;padding:16px 0;border-bottom:1px solid #EDEFF0;\">\n          <span style=\"font-size:15px;color:#737677;\">Allowed transactions<\u002Fspan><span style=\"font-size:15px;color:#1F2223;\">{{ drawerTxText }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;gap:20px;padding:16px 0;border-bottom:1px solid #EDEFF0;\">\n          <span style=\"font-size:15px;color:#737677;\">Allowed locations<\u002Fspan><span style=\"font-size:15px;color:#1F2223;\">{{ drawerLocText }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;gap:20px;padding:16px 0;border-bottom:1px solid #EDEFF0;\">\n          <span style=\"font-size:15px;color:#737677;\">Where the card can be used<\u002Fspan><span style=\"font-size:15px;color:#1F2223;\">{{ drawerBuyText }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;gap:20px;padding:16px 0;border-bottom:1px solid #EDEFF0;\">\n          <span style=\"font-size:15px;color:#737677;\">Usage days<\u002Fspan><span style=\"font-size:15px;color:#1F2223;\">Weekdays<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ drawerAllowedShow }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;justify-content:space-between;gap:20px;padding:16px 0;border-bottom:1px solid #EDEFF0;\">\n          <span style=\"font-size:15px;color:#1F2223;font-weight:600;flex-shrink:0;\">Allowed categories<\u002Fspan>\n          <span style=\"font-size:15px;color:#1F2223;text-align:right;line-height:1.55;\">{{ drawerAllowedText }}<\u002Fspan>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ drawerRestrictedShow }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;justify-content:space-between;gap:20px;padding:16px 0;border-bottom:1px solid #EDEFF0;\">\n          <span style=\"font-size:15px;color:#1F2223;font-weight:600;flex-shrink:0;\">Restricted categories<\u002Fspan>\n          <span style=\"font-size:15px;color:#1F2223;text-align:right;line-height:1.55;\">{{ drawerRestrictedText }}<\u002Fspan>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ customLimitsShow }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;justify-content:space-between;gap:20px;padding:16px 0;border-bottom:1px solid #EDEFF0;\">\n          <span style=\"font-size:15px;color:#1F2223;font-weight:600;flex-shrink:0;\">Custom category limits<\u002Fspan>\n          <span style=\"font-size:15px;color:#1F2223;text-align:right;line-height:1.55;\">{{ customLimitsText }}<\u002Fspan>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"flex-shrink:0;padding:16px 32px;border-top:1px solid #EDEFF0;display:flex;justify-content:center;\">\n        <div style=\"font-size:16px;font-weight:600;color:#fff;background:#335894;border-radius:8px;padding:13px 60px;cursor:pointer;letter-spacing:-0.011em;\">View transactions<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:760}}\">\nclass Component extends DCLogic {\n  state = {\n    open: 'category',\n    created: false,\n    viewing: false,\n    limit: '1,000.00',\n    buyMode: '',\n    limitMode: 'same',\n    amts: { comm: '500', car: '500' },\n    layout: 'E',\n    tableExpanded: false,\n    tx: { inperson: true, online: true },\n    loc: { national: true, international: true },\n    merchant: 'shared',\n    tcats: [\n      { name: 'Communications', amt: '5,900' },\n      { name: 'Car rental',      amt: '500' },\n    ],\n    cMenuOpen: null,\n    cShowUnassigned: false,\n    dcats: [\n      { name: 'Communications',  amt: 400, locked: false },\n      { name: 'Car rental',      amt: 300, locked: false },\n      { name: 'Travel',          amt: 200, locked: false },\n      { name: 'Meals & dining',  amt: 100, locked: false },\n    ],\n    cgroups: [\n      { cats: ['Communications','Internet','Software','Advertising','Entertainment'], amt: '500' },\n      { cats: ['Travel','Hotels'], amt: '2,000' },\n      { cats: ['Meals & dining'], amt: '300' },\n    ],\n    // Option E — contextual limits\n    eMode1: 'specific',          // Anywhere: 'none' | 'specific'\n    eMode2: 'all',               // Only some places: 'all' (no limits) | 'set'\n    eExceptions: [               // Anywhere → categories that get a custom limit\n      { name: 'Travel',         amt: '500' },\n      { name: 'Meals & dining', amt: '300' },\n    ],\n    eSelAmts: {},                // Only some places → per-category limits; unset = card limit\n    eSelLimited: [],             // Only some places → categories that have a custom limit (subset of allowedCats)\n    eSelAddOpen: false,          // \"+ Add category limit\" selector (Only some places)\n    allowedCats: [],             // \"Allowed to buy\" selection\n    allowedOpen: false,\n    allowedSearch: '',\n    eAddOpen: false,\n    buyOpen: false,              // \"Where will you be able to buy?\" dropdown\n    renewFreq: 'Monthly',        // card limit renewal frequency\n    renewOpen: false,            // renewal-frequency dropdown\n    eAnyRows: [ { name: '', amt: '' } ],  // Anywhere → one empty row by default\n    eAnyMode: 'all',             // Anywhere: 'all' | 'set'\n    eRowMenuOpen: null,          // which Anywhere row's category picker is open\n  };\n\n  ALL_CATS = ['Communications','Internet','Software','Advertising','Entertainment','Travel','Hotels','Meals & dining','Office supplies','Lodging','Transport','Car rental','Fuel'];\n\n  componentDidMount(){\n    this._onKey = (e)=>{ if(e.key==='Escape') this.setState({ allowedOpen:false, buyOpen:false, renewOpen:false, eSelAddOpen:false, eRowMenuOpen:null }); };\n    document.addEventListener('keydown', this._onKey);\n  }\n  componentWillUnmount(){ document.removeEventListener('keydown', this._onKey); }\n\n  num(v){ return parseFloat(String(v).replace(/[^0-9.]/g,'')) || 0; }\n  money(n){ return '$' + n.toLocaleString('en-US'); }\n\n  // Rebalance so cats always sum to total: set cats[idx]=val, distribute the\n  // remainder across the UNLOCKED other categories. Locked categories (other\n  // than the one being edited) never change. The edited category is always\n  // allowed to change, even if locked.\n  rebalance(cats, idx, val, total){\n    const lockedOthersSum = cats.reduce((a,c,i)=> i!==idx && c.locked ? a+c.amt : a, 0);\n    const maxForIdx = Math.max(0, total - lockedOthersSum);\n    val = Math.max(0, Math.min(maxForIdx, Math.round(val)));\n    const unlockedOthers = cats.filter((c,i)=> i!==idx && !c.locked);\n    const unlockedSum = unlockedOthers.reduce((a,c)=>a+c.amt,0);\n    const remaining = total - val - lockedOthersSum;\n    let out = cats.map((c,i)=>{\n      if(i===idx) return { ...c, amt: val };\n      if(c.locked) return c;\n      const share = unlockedSum>0 ? c.amt/unlockedSum : (unlockedOthers.length ? 1/unlockedOthers.length : 0);\n      return { ...c, amt: Math.max(0, Math.round(remaining*share)) };\n    });\n    // fix rounding drift on an unlocked, non-edited category\n    const drift = total - out.reduce((a,c)=>a+c.amt,0);\n    if(drift!==0){\n      const fixAt = out.findIndex((c,i)=>i!==idx && !c.locked && c.amt+drift>=0);\n      if(fixAt>=0) out[fixAt] = { ...out[fixAt], amt: out[fixAt].amt+drift };\n      else out[idx] = { ...out[idx], amt: Math.max(0, out[idx].amt+drift) };\n    }\n    return out;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const open = s.open;\n    const toggle = (k) => () => this.setState(st => ({ open: st.open === k ? null : k }));\n    const some = s.buyMode === 'some';\n    const restrict = s.buyMode === 'restrict';\n    const anywhere = s.buyMode === 'anywhere';\n    const showAllowed = some || restrict;   // \"Allowed to buy\" multiselect visible\n    const buySelected = !!s.buyMode;\n    const custom = s.limitMode === 'custom';\n    const total = this.num(s.limit) || 1000;\n    const isA = s.layout === 'A';\n    const isB = s.layout === 'B';\n    const isC = s.layout === 'C';\n    const isD = s.layout === 'D';\n    const isE = s.layout === 'E';\n\n    // stacked totals\n    const allocated = this.num(s.amts.comm) + this.num(s.amts.car);\n    const over = allocated - total;\n    const hasError = custom && some && isA && over > 0;\n\n    // table totals\n    const tcats = s.tcats;\n    const tAllocated = tcats.reduce((a,c)=>a+this.num(c.amt),0);\n    const tOver = tAllocated - total;\n    const tHasError = custom && some && isB && tOver > 0;\n    const shown = s.tableExpanded ? tcats.length : Math.min(5, tcats.length);\n    const setTAmt = (idx) => (e) => { const v = e.target.value; this.setState(st => { const n = st.tcats.slice(); n[idx] = { ...n[idx], amt: v }; return { tcats: n }; }); };\n    const trows = tcats.slice(0, shown).map((c,idx)=>({ name:c.name, amt:c.amt, onChange:setTAmt(idx) }));\n    const hiddenCount = tcats.length - 5;\n\n    // ---- Option C: grouped limits ----\n    const cgroups = s.cgroups;\n    const assigned = new Set();\n    cgroups.forEach(g => g.cats.forEach(c => assigned.add(c)));\n    const unassigned = this.ALL_CATS.filter(c => !assigned.has(c));\n    const cAllocated = cgroups.reduce((a,g)=>a+this.num(g.amt),0);\n    const cOver = cAllocated - total;\n    const cHasError = custom && some && isC && cOver > 0;\n    const setCAmt = (gi) => (e) => { const v=e.target.value; this.setState(st=>{ const n=st.cgroups.slice(); n[gi]={...n[gi],amt:v}; return {cgroups:n}; }); };\n    const removeCat = (gi,name) => () => this.setState(st=>{ const n=st.cgroups.map(g=>({...g,cats:g.cats.slice()})); n[gi].cats=n[gi].cats.filter(c=>c!==name); return {cgroups:n}; });\n    const toggleMenu = (gi) => () => this.setState(st=>({ cMenuOpen: st.cMenuOpen===gi?null:gi }));\n    const addCat = (gi,name) => () => this.setState(st=>{ const n=st.cgroups.map(g=>({...g,cats:g.cats.slice()})); n[gi].cats.push(name); return {cgroups:n, cMenuOpen:null}; });\n    const removeGroup = (gi) => () => this.setState(st=>({ cgroups: st.cgroups.filter((_,i)=>i!==gi), cMenuOpen:null }));\n    const cgroupRows = cgroups.map((g,gi)=>({\n      amt: g.amt,\n      onAmt: setCAmt(gi),\n      chips: g.cats.map(name=>({ name, onRemove: removeCat(gi,name) })),\n      isEmpty: g.cats.length===0,\n      manyCats: g.cats.length>2,\n      fewCats: g.cats.length<=2,\n      catCountLabel: g.cats.length + (g.cats.length===1?' category':' categories'),\n      menuOpen: s.cMenuOpen===gi,\n      toggleMenu: toggleMenu(gi),\n      addOptions: unassigned.map(name=>({ name, onAdd: addCat(gi,name) })),\n      hasUnassigned: unassigned.length>0,\n      onRemoveGroup: removeGroup(gi),\n      isLast: gi===cgroups.length-1,\n    }));\n    const addGroup = ()=> this.setState(st=>({ cgroups: st.cgroups.concat([{cats:[],amt:''}]) }));\n\n    // ---- Option D: auto-balancing sliders with locks ----\n    const dRaw = s.dcats;\n    const dAllLocked = dRaw.every(c=>c.locked);\n    const dSum = dRaw.reduce((a,c)=>a+c.amt,0);\n    // normalize display to the current card limit (keeps Remaining at 0),\n    // but never when everything is locked (we can't safely rebalance then)\n    const firstUnlocked = dRaw.findIndex(c=>!c.locked);\n    const dcats = (dSum===total || dAllLocked || firstUnlocked<0) ? dRaw\n      : this.rebalance(dRaw, firstUnlocked, dRaw[firstUnlocked].amt + (total - dSum), total);\n    const setDVal = (idx) => (raw) => {\n      if (this.state.dcats.every(c=>c.locked)) return; // fully locked → no auto changes\n      const v = this.num(raw);\n      this.setState({ dcats: this.rebalance(this.state.dcats, idx, v, this.num(this.state.limit)||1000) });\n    };\n    const toggleDLock = (idx) => () => this.setState(st=>{\n      const n = st.dcats.map((c,i)=> i===idx ? { ...c, locked: !c.locked } : c);\n      return { dcats: n };\n    });\n    const drows = dcats.map((c,idx)=>{\n      const pct = total>0 ? Math.round(c.amt/total*100) : 0;\n      return {\n        name: c.name,\n        amt: c.amt,\n        amtDisp: c.amt.toLocaleString('en-US'),\n        locked: c.locked,\n        unlocked: !c.locked,\n        lockColor: c.locked ? '#404344' : '#9C9FA0',\n        trackBg: 'linear-gradient(to right,#737677 0%,#737677 '+pct+'%,#DFE1E2 '+pct+'%,#DFE1E2 100%)',\n        sliderOpacity: dAllLocked ? '0.45' : '1',\n        sliderPe: dAllLocked ? 'none' : 'auto',\n        onToggleLock: toggleDLock(idx),\n        onSlide: (e)=> setDVal(idx)(e.target.value),\n        onType: (e)=> setDVal(idx)(e.target.value),\n      };\n    });\n    const dAllocated = dcats.reduce((a,c)=>a+c.amt,0);\n\n    // ---- Option E: contextual limits (depends on \"Where will you be able to buy?\") ----\n    // Scenario \"Anywhere\" / \"Restrict some places\": limit specific categories — each row picks a category + amount.\n    // In restrict mode the \"Categories to restrict\" list (allowedCats) must be excluded from the picker.\n    const eRestrictSet = new Set(restrict ? s.allowedCats : []);\n    const eAnyUsed = new Set(s.eAnyRows.map(r=>r.name).filter(Boolean));\n    const eAnyRows = s.eAnyRows.map((r,idx)=>({\n      hasName: !!r.name,\n      canRemove: true,\n      helperMargin: '42px',\n      rowError: this.num(r.amt) > total,\n      showPctHelper: !!r.name && r.amt!=='' && r.amt!=null && !(this.num(r.amt) > total),\n      pctHelper: 'Uses ' + (total>0 ? Math.round(this.num(r.amt)/total*100) : 0) + '% of the ' + (s.renewFreq==='Does not renew' ? 'total' : s.renewFreq.toLowerCase()) + ' card limit.',\n      rowBorder: this.num(r.amt) > total ? '1.5px solid #B00020' : '1px solid #BBBEBF',\n      displayName: r.name || 'Select ca
